name: "Godot Build Pipeline"

on:
  push:
    branches: [ "main"]
  pull_request:
    branches: [ "main"]

env:
  GODOT_VERSION: 4.6.1
  EXPORT_NAME: legions-expedition

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot Import
        uses: actions/cache@v4
        with:
          path: .godot/
          key: godot-import-windows-${{ hashFiles('**/*.import', 'project.godot') }}

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Inject Talo Config
        run: |
          mkdir -p addons/talo/
          cat <<EOF > addons/talo/settings.cfg
          [config]
          access_key="${{ secrets.TALO_API_KEY }}"
          cache_player_on_identify=false
          handle_tree_quit=true
          EOF

      - name: Windows Build
        run: |
          mkdir -p build/windows
          godot --headless --export-release "Windows Desktop" build/windows/$EXPORT_NAME.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows Build
          path: build/windows

  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Godot Import
        uses: actions/cache@v4
        with:
          path: .godot/
          key: godot-import-web-${{ hashFiles('**/*.import', 'project.godot') }}

      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable

      - name: Inject Talo Config
        run: |
          mkdir -p addons/talo/
          cat <<EOF > addons/talo/settings.cfg
          [config]
          access_key="${{ secrets.TALO_API_KEY }}"
          api_url="https://api.trytalo.com"
          socket_url="wss://api.trytalo.com"
          cache_player_on_identify=false
          handle_tree_quit=true
          EOF

      - name: Web Build
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Web Build
          path: build/web

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: export-web
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: Web Build
          path: build/web

      - name: Deploy to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build/web
          clean: true

  deploy-itch:
    name: Deploy to itch.io
    needs: [export-windows, export-web]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Windows Build
          path: build/windows

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: Web Build
          path: build/web

      - name: Install Official itch.io Butler CLI
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          sudo mv butler /usr/local/bin/

      - name: Publish Windows Build
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_IO_API_KEY }}
        run: butler push build/windows dneee6/legions-expedition:windows

      - name: Publish Web Build
        env:
          BUTLER_API_KEY: ${{ secrets.ITCH_IO_API_KEY }}
        run: butler push build/web dneee6/legions-expedition:html